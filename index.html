    content: "";

    border-radius: 50%;

<body>

        onclick="openStatusPage()"
        class="status-button"

        aria-label="Plutonium Status"
        >
            <span class="status-icon"></span>
        </button>

        <button onclick="toggleDarkMode()" id="darkModeButton">
            🌙
        </button>

        <button onclick="loadServers()">
            Refresh
        </button>

        <button onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Scroll to top">
            ↑ Top
        </button>

    </div>

</div>

<!-- BOTONES DE JUEGOS -->

<div id="gameButtons" class="game-buttons"></div>

<!-- BUSCADOR -->

<div class="search-container">

<input
type="text"
id="searchInput"
placeholder="Search server, IP, map, country..."
onkeydown="handleSearchKey(event)"

>

<button onclick="searchServers()">
    Search
</button>

<button onclick="clearSearch()">
    Clear
</button>

</div>



<div id="servers"></div>

<script>

const API_URLS = [

    "https://gameserve.rs/api/v1/servers?platform=plutonium&game=T6&limit=500",

    "https://gameserve.rs/api/v1/servers?platform=plutonium&game=T6ZM&limit=500",

    "https://gameserve.rs/api/v1/servers?platform=plutonium&game=IW5&limit=500",

    "https://gameserve.rs/api/v1/servers?platform=plutonium&game=T4&limit=500",

    "https://gameserve.rs/api/v1/servers?platform=plutonium&game=T4ZM&limit=500",

    "https://gameserve.rs/api/v1/servers?platform=plutonium&game=T5&limit=500",

    "https://gameserve.rs/api/v1/servers?platform=plutonium&game=T5ZM&limit=500"

];

let allServers = [];

let currentSort = "players";

let sortDescending = true;

let expandedServerId = null;

let selectedGame = "ALL";

const urlParams =
    new URLSearchParams(
        window.location.search
    );

let searchQuery =
    (
        urlParams.get("q") || ""
    )
        .trim()
        .toLowerCase();

window.addEventListener(
    "DOMContentLoaded",
    () => {

        const input =
            document.getElementById(
                "searchInput"
            );

        if (input) {

            input.value =
                searchQuery;

        }

    }
);

/* =========================
   BOTÓN STATUS
========================= */

function openStatusPage() {

    window.open(
        "https://status.plutonium.pw/",
        "_blank"
    );

}

/* =========================
   CARGAR SERVIDORES
========================= */

async function loadServers() {

    const status =
        document.getElementById(
            "status"
        );

    status.textContent =
        "Loading servers...";

    try {

        const responses =
            await Promise.all(

                API_URLS.map(

                    url =>
                        fetch(url)

                )

            );

        responses.forEach(

            response => {

                if (!response.ok) {

                    throw new Error(
                        "HTTP " +
                        response.status
                    );

                }

            }

        );

        const results =
            await Promise.all(

                responses.map(

                    response =>
                        response.json()

                )

            );

        allServers =
            results.flatMap(

                result => {

                    if (

                        result &&
                        result.success &&
                        result.data &&
                        Array.isArray(
                            result.data.servers
                        )

                    ) {

                        return result.data.servers

                            .filter(

                                server =>
                                    server != null

                            );

                    }

                    return [];

                }

            );

        const uniqueServers =
            new Map();

        allServers

            .filter(

                server =>
                    server != null

            )

            .forEach(

                server => {

                    const serverId =

                        server.id ||

                        server.address ||

                        (

                            server.ip &&
                            server.port

                                ?

                            `${server.ip}:${server.port}`

                                :

                            null

                        );

                    if (serverId) {

                        uniqueServers.set(

                            serverId,

                            server

                        );

                    }

                }

            );

        allServers =
            Array.from(

                uniqueServers.values()

            );

        const totalPlayers =
            allServers.reduce(

                (total, server) => {

                    return total +

                        Number(

                            server?.players?.current ||

                            0

                        );

                },

                0

            );

        status.innerHTML =

            allServers.length +

            " servers | " +

            totalPlayers +

            " players online<br>Last updated on<br>" +

new Date().toLocaleString("en-US", {
    month: "short",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit",
    hour12: true
});

        renderGameButtons();

        renderServers();

    }

    catch (error) {

        console.error(error);

        status.innerHTML =

            `

            <span class="error">

                Error loading servers:

                ${escapeHtml(

                    error?.message ||

                    "Unknown error"

                )}

            </span>

            `;

    }

}

/* =========================
   BOTONES DE JUEGOS
========================= */

function renderGameButtons() {

    const container =
        document.getElementById(
            "gameButtons"
        );

    container.innerHTML =
        "";

    const allPlayers =
        allServers.reduce(

            (total, server) => {

                return total +

                    Number(

                        server?.players?.current ||

                        0

                    );

            },

            0

        );

    const allButton =
        document.createElement(
            "button"
        );

    allButton.className =
        "game-button";

    if (

        selectedGame ===
        "ALL"

    ) {

        allButton.classList.add(
            "active"
        );

    }

    allButton.innerHTML = `

        <strong>
            ALL
        </strong>

        <small>

            All Games

            <br>

            ${allServers.length}

            servers

            ·

            ${allPlayers}

            online

        </small>

    `;

    allButton.onclick =

        () => {

            selectedGame =
                "ALL";

            expandedServerId =
                null;

            renderGameButtons();

            renderServers();

        };

    container.appendChild(
        allButton
    );

    const games = {};

    allServers.forEach(

        server => {

            const gameId =

                server.game?.id ||

                "UNKNOWN";

            const gameName =

                server.game?.name ||

                "Unknown Game";

            if (!games[gameId]) {

                games[gameId] = {

                    id:
                        gameId,

                    name:
                        gameName,

                    servers:
                        []

                };

            }

            games[gameId]

                .servers

                .push(server);

        }

    );

    Object.values(games)

        .forEach(

            game => {

                const players =

                    game.servers.reduce(

                        (total, server) => {

                            return total +

                                Number(

                                    server?.players?.current ||

                                    0

                                );

                        },

                        0

                    );

                const button =

                    document.createElement(
                        "button"
                    );

                button.className =
                    "game-button";

                if (

                    selectedGame ===
                    game.id

                ) {

                    button.classList.add(
                        "active"
                    );

                }

                button.innerHTML = `

                    <strong>

                        ${escapeHtml(

                            getShortGameName(

                                game.id

                            )

                        )}

                    </strong>

                    <small>

                        ${escapeHtml(

                            game.name

                        )}

                        <br>

                        ${game.servers.length}

                        servers

                        ·

                        ${players}

                        online

                    </small>

                `;

                button.onclick =

                    () => {

                        selectedGame =
                            game.id;

                        expandedServerId =
                            null;

                        renderGameButtons();

                        renderServers();

                    };

                container.appendChild(
                    button
                );

            }

        );

}

/* =========================
   NOMBRES CORTOS
========================= */

function getShortGameName(

    gameId

) {

    const names = {

        "T6":
            "BO2 MP",

        "T6ZM":
            "BO2 ZM",

        "IW5":
            "MW3 MP",

        "T5":
            "BO1 MP",

        "T5ZM":
            "BO1 ZM",

        "T4":
            "WaW MP",

        "T4ZM":
            "WaW ZM"

    };

    return names[gameId] ||

        gameId;

}

/* =========================
   RENDER SERVIDORES
========================= */

function renderServers() {

    const container =
        document.getElementById(
            "servers"
        );

    container.innerHTML =
        "";

    let filteredServers =
        allServers;

    if (

        selectedGame !==
        "ALL"

    ) {

        filteredServers =

            filteredServers.filter(

                server =>

                    server.game?.id ===

                    selectedGame

            );

    }

    if (searchQuery) {

        filteredServers =

            filteredServers.filter(

                server => {

                    if (!server) {

                        return false;

                    }

                    const searchableText = [

                        server.name,

                        server.ip,

                        server.address,

                        server.map?.display,

                        server.map?.raw,

                        server.mode?.display,

                        server.mode?.raw,

                        server.location?.countryName,

                        server.location?.countryCode,

                        server.game?.name,

                        server.game?.id

                    ]

                        .filter(Boolean)

                        .join(" ")

                        .toLowerCase();

                    return searchableText.includes(

                        searchQuery

                    );

                }

            );

    }

    const games = {};

    filteredServers

        .filter(

            server =>
                server != null

        )

        .forEach(

            server => {

                const gameId =

                    server.game?.id ||

                    "UNKNOWN";

                const gameName =

                    server.game?.name ||

                    "Unknown Game";

                if (!games[gameId]) {

                    games[gameId] = {

                        name:
                            gameName,

                        servers:
                            []

                    };

                }

                games[gameId]

                    .servers

                    .push(server);

            }

        );

    Object.entries(games)

        .forEach(

            ([gameId, game]) => {

                renderGame(

                    gameId,

                    game,

                    container

                );

            }

        );

    if (

        filteredServers.length ===
        0

    ) {

        container.innerHTML =

            `

            <div class="no-results">

                No servers found.

            </div>

            `;

    }

}

/* =========================
   RENDER GAME
========================= */

function renderGame(

    gameId,

    game,

    container

) {

    const gameElement =

        document.createElement(
            "div"
        );

    gameElement.className =
        "game";

    gameElement.dataset.gameId =
        gameId;

    const gameTitle =

        document.createElement(
            "h2"
        );

    gameTitle.className =
        "game-title";

    gameTitle.textContent =

        game.name +

        " - " +

        game.servers.length +

        " servers";

    gameElement.appendChild(
        gameTitle
    );

    const tableContainer =

        document.createElement(
            "div"
        );

    tableContainer.className =
        "table-container";

    const table =

        document.createElement(
            "table"
        );

    const thead =

        document.createElement(
            "thead"
        );

    thead.innerHTML = `

        <tr>

            <th onclick="sortByCountry()">

                Country

                ${

                    currentSort ===
                    "country"

                        ?

                    `

                        <span class="sort-arrow">

                            ${

                                sortDescending

                                    ?

                                "▼"

                                    :

                                "▲"

                            }

                        </span>

                    `

                        :

                    ""

                }

            </th>

            <th onclick="sortByServer()">
                Server
                ${currentSort === "server" ? `<span class="sort-arrow">${sortDescending ? "&#9660;" : "&#9650;"}</span>` : ""}
            </th>

            <th onclick="sortByPlayers()">

                Players

                ${

                    currentSort ===
                    "players"

                        ?

                    `

                        <span class="sort-arrow">

                            ${

                                sortDescending

                                    ?

                                "▼"

                                    :

                                "▲"

                            }

                        </span>

                    `

                        :

                    ""

                }

            </th>

            <th onclick="sortByMap()">
                Map
                ${currentSort === "map" ? `<span class="sort-arrow">${sortDescending ? "&#9660;" : "&#9650;"}</span>` : ""}
            </th>

            <th onclick="sortByMode()">
                Mode
                ${currentSort === "mode" ? `<span class="sort-arrow">${sortDescending ? "&#9660;" : "&#9650;"}</span>` : ""}
            </th>

        </tr>

    `;

    table.appendChild(
        thead
    );

    const tbody =

        document.createElement(
            "tbody"
        );

    const sortedServers =

        [...game.servers]

            .sort(

                sortServers

            );

    sortedServers.forEach(

        server => {

            if (!server) {

                return;

            }

            const serverId =

                server.id ||

                server.address ||

                (

                    server.ip &&
                    server.port

                        ?

                    `${server.ip}:${server.port}`

                        :

                    Math.random()

                );

            const players =
                server.players || {};

            const currentPlayers =

                Number(

                    players.current ||

                    0

                );

            const maxPlayers =

                Number(

                    players.max ||

                    0

                );

            let country =

                server.location?.countryName ||

                server.location?.countryCode ||

                "Unknown";

            let countryCode =

                server.location?.countryCode ||

                getCountryCode(country);

            if (

                server.ip ===
                "74.0.5.27"

            ) {

                country =
                    "Brazil";

                countryCode =
                    "BR";

            }

            const flag =

                getCountryFlag(

                    countryCode

                );

            const isExpanded =

                expandedServerId ===
                serverId;
            let playerClass="player-empty";
            if(currentPlayers==maxPlayers && maxPlayers>0){playerClass="player-full";}
            else if(currentPlayers>=9){playerClass="player-medium";}
            else if(currentPlayers>=1){playerClass="player-low";}

            const row =

                document.createElement(
                    "tr"
                );

            row.className =
                "server-row";

            row.onclick =

                () => {

                    toggleServer(

                        serverId

                    );

                };

            row.innerHTML = `

                <td

                    class="country"

                    title="${escapeHtml(country)}"

                >

                    ${flag}

                </td>

                <td class="server-name">

                    <span

                        class="expand-arrow ${

                            isExpanded

                                ?

                            "open"

                                :

                            ""

                        }"

                    >

                        ${

                            isExpanded

                                ?

                            "⌃"

                                :

                            "⌄"

                        }

                    </span>

                    ${escapeHtml(

                        server.name ||

                        "Unknown Server"

                    )}

                </td>

                <td class="players-count"><span class="player-box ${playerClass}">${currentPlayers}/${maxPlayers}</span></td>

                <td>

                    ${escapeHtml(

                        server.map?.display ||

                        server.map?.raw ||

                        "Unknown"

                    )}

                </td>

                <td>

                    ${escapeHtml(

                        server.mode?.display ||

                        server.mode?.raw ||

                        "Unknown"

                    )}

                </td>

            `;

            tbody.appendChild(
                row
            );

            if (

                expandedServerId ===
                serverId

            ) {

                const detailsRow =

                    createDetailsRow(

                        server

                    );

                tbody.appendChild(
                    detailsRow
                );

            }

        }

    );

    table.appendChild(
        tbody
    );

    tableContainer.appendChild(
        table
    );

    gameElement.appendChild(
        tableContainer
    );

    container.appendChild(
        gameElement
    );

}

/* =========================
   BANDERAS
========================= */

function getCountryFlag(

    countryCode

) {

    if (

        !countryCode ||

        countryCode.length !== 2

    ) {

        return "🌐";

    }

    const code =

        countryCode

            .toLowerCase();

    return `

        <img

            src="https://flagcdn.com/w40/${code}.png"

            alt="${code}"

            class="country-flag"

            loading="lazy"

        >

    `;

}

/* =========================
   CODIGOS DE PAIS
========================= */

function getCountryCode(

    countryName

) {

    const countries = {

        "argentina":
            "AR",

        "brazil":
            "BR",

        "brasil":
            "BR",

        "united states":
            "US",

        "usa":
            "US",

        "canada":
            "CA",

        "mexico":
            "MX",

        "chile":
            "CL",

        "uruguay":
            "UY",

        "paraguay":
            "PY",

        "bolivia":
            "BO",

        "peru":
            "PE",

        "colombia":
            "CO",

        "venezuela":
            "VE",

        "ecuador":
            "EC",

        "germany":
            "DE",

        "france":
            "FR",

        "spain":
            "ES",

        "italy":
            "IT",

        "portugal":
            "PT",

        "united kingdom":
            "GB",

        "uk":
            "GB",

        "netherlands":
            "NL",

        "belgium":
            "BE",

        "switzerland":
            "CH",

        "austria":
            "AT",

        "poland":
            "PL",

        "russia":
            "RU",

        "ukraine":
            "UA",

        "turkey":
            "TR",

        "australia":
            "AU",

        "japan":
            "JP",

        "china":
            "CN",

        "south korea":
            "KR",

        "india":
            "IN",

        "singapore":
            "SG",

        "south africa":
            "ZA"

    };

    if (!countryName) {

        return null;

    }

    return countries[

        String(countryName)

            .trim()

            .toLowerCase()

    ] || null;

}

/* =========================
   ORDENAMIENTO
========================= */

function sortServers(

    a,

    b

) {

    if (!a || !b) {

        return 0;

    }

    if (

        currentSort ===
        "country"

    ) {

        const countryA =

            (

                a.location?.countryName ||

                a.location?.countryCode ||

                "Unknown"

            )

                .toLowerCase();

        const countryB =

            (

                b.location?.countryName ||

                b.location?.countryCode ||

                "Unknown"

            )

                .toLowerCase();

        const result =

            countryA.localeCompare(

                countryB

            );

        return sortDescending

            ?

            -result

            :

            result;

    }

    if (

        currentSort ===
        "players"

    ) {

        const playersA =

            Number(

                a.players?.current ||

                0

            );

        const playersB =

            Number(

                b.players?.current ||

                0

            );

        return sortDescending

            ?

            playersB - playersA

            :

            playersA - playersB;

    }

    if (currentSort === "server") {
        const r = (a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase());
        return sortDescending ? -r : r;
    }
    if (currentSort === "map") {
        const r = (a.map?.display||a.map?.raw||"").toLowerCase().localeCompare((b.map?.display||b.map?.raw||"").toLowerCase());
        return sortDescending ? -r : r;
    }
    if (currentSort === "mode") {
        const r = (a.mode?.display||a.mode?.raw||"").toLowerCase().localeCompare((b.mode?.display||b.mode?.raw||"").toLowerCase());
        return sortDescending ? -r : r;
    }
    return 0;

}

/* =========================
   ORDENAR POR PAIS
========================= */

function sortByCountry() {

    if (

        currentSort ===
        "country"

    ) {

        sortDescending =
            !sortDescending;

    }

    else {

        currentSort =
            "country";

        sortDescending =
            false;

    }

    renderServers();

}

/* =========================
   ORDENAR POR JUGADORES
========================= */

function sortByPlayers() {

    if (

        currentSort ===
        "players"

    ) {

        sortDescending =
            !sortDescending;

    }

    else {

        currentSort =
            "players";

        sortDescending =
            true;

    }

    renderServers();

}

function sortByServer(){
    if(currentSort==="server"){sortDescending=!sortDescending;}else{currentSort="server";sortDescending=false;}
    renderServers();
}
function sortByMap(){
    if(currentSort==="map"){sortDescending=!sortDescending;}else{currentSort="map";sortDescending=false;}
    renderServers();
}
function sortByMode(){
    if(currentSort==="mode"){sortDescending=!sortDescending;}else{currentSort="mode";sortDescending=false;}
    renderServers();
}

/* =========================
   BUSQUEDA
========================= */

function handleSearchKey(

    event

) {

    if (

        event.key ===
        "Enter"

    ) {

        searchServers();

    }

}

function searchServers() {

    const input =

        document.getElementById(

            "searchInput"

        );

    const query =

        input.value

            .trim()

            .toLowerCase();

    searchQuery =
        query;

    const url =

        new URL(

            window.location.href

        );

    if (query) {

        url.searchParams.set(

            "q",

            query

        );

    }

    else {

        url.searchParams.delete(

            "q"

        );

    }

    window.history.pushState(

        {},

        "",

        url

    );

    expandedServerId =
        null;

    renderServers();

}

function clearSearch() {

    const input =

        document.getElementById(

            "searchInput"

        );

    input.value =
        "";

    searchQuery =
        "";

    const url =

        new URL(

            window.location.href

        );

    url.searchParams.delete(

        "q"

    );

    window.history.pushState(

        {},

        "",

        url

    );

    expandedServerId =
        null;

    renderServers();

}

/* =========================
   EXPANDIR SERVIDOR
========================= */

function toggleServer(

    serverId

) {

    if (

        expandedServerId ===
        serverId

    ) {

        expandedServerId =
            null;

    }

    else {

        expandedServerId =
            serverId;

    }

    renderServers();

}

/* =========================
   DETALLES
========================= */

function createDetailsRow(

    server

) {

    const row =

        document.createElement(
            "tr"
        );

    row.className =
        "details-row";

    const cell =

        document.createElement(
            "td"
        );

    cell.colSpan =
        5;

    const details =

        document.createElement(
            "div"
        );

    details.className =
        "details";

    const players =
        server.players || {};

    const address =

        server.address ||

        (

            server.ip &&
            server.port

                ?

            `${server.ip}:${server.port}`

                :

            "Unknown"

        );

    details.innerHTML = `
        <p><strong>Servername:</strong> ${escapeHtml(server.name || "Unknown Server")}</p>
        <p><strong>Connect:</strong> ${escapeHtml(address)}
        <button class="copy-button" onclick="copyConnectCommand(event,'${escapeHtml(address)}')" title="Copy connection command">⧉</button></p>
        <p><strong>Players:</strong> ${players.current || 0} / ${players.max || 0}</p>
        <p><strong>Map:</strong> ${escapeHtml(server.map?.display || server.map?.raw || "Unknown")}</p>
        <p><strong>Mode:</strong> ${escapeHtml(server.mode?.display || server.mode?.raw || "Unknown")}</p>
    `;

    cell.appendChild(
        details
    );

    row.appendChild(
        cell
    );

    return row;

}

/* =========================
   COPIAR CONEXION
========================= */

function copyConnectCommand(

    event,

    address

) {

    event.stopPropagation();

    const command =

        "connect " +

        address;

    navigator.clipboard.writeText(

        command

    );

    const button =
        event.currentTarget;

    button.textContent =
        "✓";

    button.classList.add(
        "copied"
    );

    setTimeout(

        () => {

            button.textContent =
                "⧉";

            button.classList.remove(
                "copied"
            );

        },

        1500

    );

}

/* =========================
   MODO OSCURO
========================= */

function toggleDarkMode() {

    document.body.classList.toggle(

        "dark-mode"

    );

    const enabled =

        document.body.classList.contains(

            "dark-mode"

        );

    localStorage.setItem(

        "darkMode",

        enabled

            ?

        "yes"

            :

        "no"

    );

    document.getElementById(

        "darkModeButton"

    ).textContent =

        enabled

            ?

        "☀️"

            :

        "🌙";

}

function loadDarkMode() {

    const savedMode =

        localStorage.getItem(

            "darkMode"

        );

    if (

        savedMode === null ||

        savedMode === "yes"

    ) {

        document.body.classList.add(

            "dark-mode"

        );

        document.getElementById(

            "darkModeButton"

        ).textContent =

            "☀️";

    }

}

/* =========================
   ESCAPAR HTML
========================= */

function escapeHtml(

    text

) {

    const div =

        document.createElement(

            "div"

        );

    div.textContent =

        String(

            text ?? ""

        );

    return div.innerHTML;

}

/* =========================
   INICIAR
========================= */

loadDarkMode();

loadServers();

setInterval(

    loadServers,

    30000

);

</script>
